  <style>
    :root {
      --ink: #17191d;
      --muted: #666b73;
      --paper: #f7f4ee;
      --panel: #fffdf8;
      --line: #ddd6ca;
      --red: #d91f2c;
      --red-dark: #981521;
      --black: #20242b;
      --gold: #b78b3a;
      --green: #2b6f5b;
      --shadow: 0 24px 70px rgba(32, 36, 43, .14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(183, 139, 58, .08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(183, 139, 58, .07) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1520px, calc(100vw - 36px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 244, 238, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 230px;
      font-weight: 900;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      background: var(--red);
      color: #fff;
      border-radius: 6px;
      box-shadow: 7px 7px 0 var(--black);
      font-family: Georgia, serif;
      font-size: 18px;
      line-height: 1;
    }

    .brand span:last-child {
      font-size: 18px;
      white-space: nowrap;
    }

    .hero {
      display: block;
      padding: 44px 0 28px;
      min-height: 320px;
    }

    h1 {
      max-width: 850px;
      margin: 0;
      font-size: clamp(38px, 7vw, 100px);
      line-height: .94;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 720px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 30px;
      max-width: 720px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .86);
      padding: 16px;
      box-shadow: 9px 9px 0 rgba(32, 36, 43, .08);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      align-items: center;
      gap: 12px;
      margin: 8px 0 18px;
    }

    .search {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 15px;
      font: 700 15px/1.2 "Noto Serif SC", "Songti SC", serif;
      outline: none;
    }

    .search:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(183, 139, 58, .16);
    }

    .select-wrap,
    .count-pill {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    select {
      height: 44px;
      min-width: 190px;
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 0 36px 0 12px;
      font: 800 14px/1 "Noto Serif SC", "Songti SC", serif;
      outline: none;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .table-frame {
      margin-bottom: 52px;
      border: 1px solid var(--black);
      border-radius: 8px;
      overflow: auto;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
    }

    thead th {
      background: var(--black);
      color: #fff;
      border-bottom: 1px solid #000;
      padding: 14px 14px;
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }

    tbody td {
      border-bottom: 1px solid var(--line);
      padding: 14px;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.58;
    }

    tbody tr:nth-child(2n) {
      background: rgba(32, 36, 43, .025);
    }

    tbody tr:hover {
      background: rgba(183, 139, 58, .12);
    }

    .unit {
      min-width: 122px;
      color: #fff;
      font-weight: 900;
    }

    .unit.u1,
    .unit.u4,
    .unit.u7,
    .unit.u10 {
      background: #fff;
      color: var(--black);
    }

    .unit.u2,
    .unit.u5,
    .unit.u8 {
      background: var(--red);
      color: #fff;
    }

    .unit.u3,
    .unit.u6,
    .unit.u9 {
      background: var(--black);
      color: #fff;
    }

    .week {
      white-space: nowrap;
      font-weight: 900;
      color: var(--red-dark);
    }

    .date {
      white-space: nowrap;
      color: var(--muted);
      font-weight: 800;
    }

    .book-title {
      display: block;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.38;
    }

    .author {
      min-width: 150px;
      font-weight: 800;
      color: var(--black);
    }

    .summary {
      min-width: 360px;
      color: #353941;
    }

    .links {
      min-width: 210px;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .link-row a {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 5px 10px;
      color: var(--black);
      font-size: 12px;
      font-weight: 900;
    }

    .link-row a:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .empty {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    footer {
      padding: 0 0 42px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .shell {
        width: min(100vw - 24px, 900px);
      }

      .hero {
        padding-top: 30px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      select,
      .count-pill {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner {
        min-height: 58px;
      }

      .brand span:last-child {
        font-size: 15px;
      }

      h1 {
        font-size: 42px;
      }

      .hero-copy {
        font-size: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const unitFilter = document.querySelector("#unitFilter");
    const searchInput = document.querySelector("#searchInput");
    const bookRows = document.querySelector("#bookRows");
    const emptyState = document.querySelector("#emptyState");
    const resultCount = document.querySelector("#resultCount");
    const bookTotal = document.querySelector("#bookTotal");
    const navCount = document.querySelector("#navCount");

    const uniqueUnits = [...new Map(books.map((book) => [book.unit, book])).values()];

    uniqueUnits.forEach((book) => {
      const option = document.createElement("option");
      option.value = book.unit;
      option.textContent = book.unit;
      unitFilter.appendChild(option);
    });

    bookTotal.textContent = books.length;
    navCount.textContent = `${books.length} 本书`;

    function makeLinks(book) {
      const query = `${book.title} ${book.author}`;
      const reviewQuery = `"${book.title}" ${book.author} 书评 介绍`;
      return [
        ["豆瓣", `https://search.douban.com/book/subject_search?search_text=${encodeURIComponent(query)}`],
        ["微信读书", `https://weread.qq.com/web/search/books?keyword=${encodeURIComponent(query)}`],
        ["书评检索", `https://www.google.com/search?q=${encodeURIComponent(reviewQuery)}`]
      ];
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();
      const unitValue = unitFilter.value;
      const filtered = books.filter((book) => {
        const haystack = `${book.unit} ${book.week} ${book.displayDate} ${book.title} ${book.author} ${book.summary}`.toLowerCase();
        const matchKeyword = !keyword || haystack.includes(keyword);
        const matchUnit = unitValue === "all" || book.unit === unitValue;
        return matchKeyword && matchUnit;
      });

      bookRows.innerHTML = filtered.map((book) => {
        const links = makeLinks(book).map(([label, url]) => (
          `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`
        )).join("");

        return `
          <tr>
            <td class="unit u${book.unitNo}">${book.unit}</td>
            <td class="week">${book.week}</td>
            <td class="date"><time datetime="${book.date}">${book.displayDate}</time></td>
            <td><span class="book-title">《${book.title}》</span></td>
            <td class="author">${book.author}</td>
            <td class="summary">${book.summary}</td>
            <td class="links"><div class="link-row">${links}</div></td>
          </tr>
        `;
      }).join("");

      resultCount.textContent = `${filtered.length} 本`;
      emptyState.hidden = filtered.length !== 0;
    }

    searchInput.addEventListener("input", render);
    unitFilter.addEventListener("change", render);
    render();
  </script>
